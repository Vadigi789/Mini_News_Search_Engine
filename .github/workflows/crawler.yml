name: Daily News Crawl

on:
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check DB_PASSWORD exists
        run: |
          if [ -z "$DB_PASSWORD" ]; then
            echo "DB_PASSWORD is empty"
            exit 1
          else
            echo "DB_PASSWORD loaded successfully"
          fi
        env:
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}

      - name: Run crawler
        run: |
          echo "Starting crawler..."
          python crawler.py || (
            echo "Crawler failed. Retrying once..."
            sleep 10
            python crawler.py
          )
        env:
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
